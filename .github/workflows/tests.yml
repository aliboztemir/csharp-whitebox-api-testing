name: Tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore dependencies
        run: dotnet restore StudyGroupApi.sln

      - name: Build solution
        run: dotnet build StudyGroupApi.sln --configuration Release --no-restore

      - name: Run tests
        run: dotnet test StudyGroupApi.sln --configuration Release --no-build
