name: Tests

on:
  push:
  pull_request:

permissions:
  contents: read
  actions: read
  checks: write
  pages: write
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore dependencies
        run: dotnet restore StudyGroupApi.sln

      - name: Build solution
        run: dotnet build StudyGroupApi.sln --configuration Release --no-restore

      - name: Run tests and generate TRX
        run: dotnet test StudyGroupApi.sln --configuration Release --no-build --logger "trx;LogFileName=test-results.trx" --results-directory TestResults

      - name: Publish test report to GitHub
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: .NET Test Results
          path: "TestResults/**/*.trx"
          reporter: dotnet-trx

      - name: Install ReportGenerator
        if: always()
        run: dotnet tool install -g dotnet-reportgenerator-globaltool

      - name: Generate HTML report
        if: always()
        run: |
          reportgenerator \
            -reports:"TestResults/**/*.trx" \
            -targetdir:"TestReport" \
            -reporttypes:"Html;HtmlSummary"

      - name: Upload TRX results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-trx
          path: TestResults/**/*.trx

      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-report-html
          path: TestReport

  deploy-pages:
    needs: test
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Download HTML report artifact
        uses: actions/download-artifact@v4
        with:
          name: test-report-html
          path: ./site

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
